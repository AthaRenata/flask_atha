<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px auto;
            max-width: 800px;
            padding: 20px;
        }
        h2 {
            margin-bottom: 20px;
        }
        .result {
            font-weight: bold;
            background-color: #f2f2f2;
            padding: 10px;
            border-left: 5px solid #007bff;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        button {
            padding: 10px 20px;
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            cursor: pointer;
            border-radius: 4px;
            float: right;
        }
        button:hover {
            background-color: #e2e6ea;
        }
    </style>
</head>
<body>

    <h2>Diabetes Prediction</h2>

    {% if prediction %}
        <div class="result">
            Hasil prediksi: {{ prediction }}
        </div>
    {% endif %}

    <form action="/predict" method="POST">
        <div class="form-group">
            <label for="model">Model</label>
            <select name="model" id="model">
                {% for name in model_names %}
                    <option value="{{ name }}" {% if selected_model == name %}selected{% endif %}>{{ name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid-container">
            <div class="form-group">
                <label for="pregnancies">Pregnancies</label>
                <input type="number" name="pregnancies" id="pregnancies" required>
            </div>

            <div class="form-group">
                <label for="glucose">Glucose</label>
                <input type="number" name="glucose" id="glucose" required>
            </div>

            <div class="form-group">
                <label for="blood_pressure">Blood Pressure</label>
                <input type="number" name="blood_pressure" id="blood_pressure" required>
            </div>

            <div class="form-group">
                <label for="skin_thickness">Skin Thickness</label>
                <input type="number" name="skin_thickness" id="skin_thickness" required>
            </div>

            <div class="form-group">
                <label for="insulin">Insulin</label>
                <input type="number" name="insulin" id="insulin" required>
            </div>

            <div class="form-group">
                <label for="bmi">BMI</label>
                <input type="number" step="0.1" name="bmi" id="bmi" required>
            </div>

            <div class="form-group">
                <label for="dpf">Diabetes Pedigree Function</label>
                <input type="number" step="0.001" name="dpf" id="dpf" required>
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" name="age" id="age" required>
            </div>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <button type="submit">Predict</button>
        </div>
    </form>

</body>
</html>
